<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>httpbin - {% block title %}Captcha Testing{% endblock %}</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input[type="text"] { padding: 8px; width: 200px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        .info { background: #f8f9fa; padding: 15px; border-radius: 5px; margin-bottom: 20px; }
        .warning { background: #fff3cd; padding: 10px; border-radius: 5px; margin-top: 10px; }
        code { background: #e9ecef; padding: 2px 6px; border-radius: 3px; }
        a { color: #007bff; }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <h1>{% block header %}Captcha Test{% endblock %}</h1>
    <div class="info">
        {% block info %}{% endblock %}
    </div>
    {% block content %}{% endblock %}
    <hr style="margin-top: 30px;">
    <p><a href="/">Back to httpbin</a></p>
</body>
</html>
